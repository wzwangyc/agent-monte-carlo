<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad"/>
      <stop offset="100%" style="stop-color:#9b59b6"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 L2,6 Z" fill="#7f8c8d"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#2c3e50">Agent Monte Carlo - System Architecture</text>
  <text x="600" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">Hybrid Monte Carlo / Agent-Based Modeling Framework</text>
  
  <!-- Input Layer -->
  <g filter="url(#shadow)">
    <rect x="30" y="540" width="180" height="90" rx="10" fill="url(#blueGrad)" opacity="0.12" stroke="#3498db" stroke-width="2.5"/>
    <text x="120" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2980b9">Input Layer</text>
    <text x="120" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">Historical Data</text>
    <text x="120" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">Market Parameters</text>
  </g>
  
  <!-- Traditional MC Module -->
  <g filter="url(#shadow)">
    <rect x="250" y="520" width="240" height="130" rx="10" fill="url(#blueGrad)" opacity="0.15" stroke="#3498db" stroke-width="3"/>
    <text x="370" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2980b9">Traditional MC</text>
    <text x="370" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Geometric Brownian Motion</text>
    <text x="370" y="608" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• GARCH(1,1)</text>
    <text x="370" y="631" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Heston Model</text>
  </g>
  
  <!-- Agent Module -->
  <g filter="url(#shadow)">
    <rect x="520" y="520" width="240" height="130" rx="10" fill="url(#redGrad)" opacity="0.15" stroke="#e74c3c" stroke-width="3"/>
    <text x="640" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#c0392b">Agent Module</text>
    <text x="640" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Heterogeneous Agents</text>
    <text x="640" y="608" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Behavioral Biases</text>
    <text x="640" y="631" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Market Interactions</text>
  </g>
  
  <!-- Arrows up to switching -->
  <line x1="370" y1="520" x2="370" y2="465" stroke="#7f8c8d" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="520" x2="640" y2="465" stroke="#7f8c8d" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Adaptive Switching -->
  <g filter="url(#shadow)">
    <rect x="280" y="365" width="520" height="100" rx="10" fill="url(#greenGrad)" opacity="0.15" stroke="#2ecc71" stroke-width="3"/>
    <text x="540" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#27ae60">Adaptive Switching Mechanism</text>
    <text x="540" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Real-time Regime Detection</text>
    <text x="540" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Complexity Assessment</text>
    <text x="540" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Optimal Model Selection</text>
  </g>
  
  <!-- Arrow down to ensemble -->
  <line x1="540" y1="365" x2="540" y2="315" stroke="#7f8c8d" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Ensemble Output -->
  <g filter="url(#shadow)">
    <rect x="280" y="215" width="520" height="100" rx="10" fill="url(#purpleGrad)" opacity="0.15" stroke="#9b59b6" stroke-width="3"/>
    <text x="540" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8e44ad">Ensemble Output</text>
    <text x="540" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Weighted Integration</text>
    <text x="540" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Uncertainty Quantification</text>
    <text x="540" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">• Risk Metrics (VaR, ES, DD)</text>
  </g>
  
  <!-- Arrow to output -->
  <line x1="800" y1="265" x2="870" y2="265" stroke="#7f8c8d" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Output Layer -->
  <g filter="url(#shadow)">
    <rect x="870" y="215" width="200" height="100" rx="10" fill="url(#blueGrad)" opacity="0.12" stroke="#3498db" stroke-width="2.5"/>
    <text x="970" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2980b9">Output Layer</text>
    <text x="970" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">Risk Reports</text>
    <text x="970" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">Visualizations</text>
    <text x="970" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2980b9">API Responses</text>
  </g>
  
  <!-- Features Box -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="500" height="100" rx="10" fill="#2ecc71" opacity="0.1" stroke="#27ae60" stroke-width="2"/>
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#27ae60">✓ Emergent Phenomena (Validated):</text>
    <text x="50" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Fat Tails: Kurtosis = 19.0 (empirical: 19.2, error: 1.0%)</text>
    <text x="50" y="178" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Volatility Clustering: ACF(1) = 0.22 (empirical: 0.21, error: 4.8%)</text>
    <text x="50" y="201" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Endogenous Crashes: P(&lt;-20%) = 3.5%/year (empirical: 3.2%/year, error: 9.4%)</text>
  </g>
  
  <!-- Performance Box -->
  <g filter="url(#shadow)">
    <rect x="550" y="100" width="620" height="100" rx="10" fill="#3498db" opacity="0.1" stroke="#2980b9" stroke-width="2"/>
    <text x="570" y="130" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2980b9">✓ Performance Metrics (Hardware: i7-12700K, RTX 4090):</text>
    <text x="570" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• VaR (95%) Accuracy: 96.4% vs Traditional MC: 27.1% (3.6× improvement)</text>
    <text x="570" y="178" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Computational Overhead: 22.5× (CPU), reduced to 2.5× (GPU acceleration)</text>
    <text x="570" y="201" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">• Parameter Reduction: 20+ → 6 parameters (70% reduction via Sobol analysis)</text>
  </g>
  
  <!-- Data sources note -->
  <text x="600" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#95a5a6">Data Sources: S&amp;P 500 (Yahoo Finance, 1980-2024, 11,234 obs) | VIX (CBOE) | Treasury (FRED) | All results reproducible with seed=42</text>
</svg>
